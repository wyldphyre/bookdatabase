{% if series_list %}
<ul class="tag-search-results">
    {% for series in series_list %}
    <li class="tag-search-item"
        onclick='selectSeries({{ series.id }}, {{ series.name|tojson }})'
        tabindex="0"
        onkeydown='if(event.key==="Enter") selectSeries({{ series.id }}, {{ series.name|tojson }})'>
        {{ series.name }}
    </li>
    {% endfor %}
</ul>
{% elif query %}
<p class="tag-search-empty">No series found matching "{{ query }}"</p>
{% endif %}
