{% if authors %}
<ul class="tag-search-results">
    {% for author in authors %}
    <li class="tag-search-item"
        onclick='addAuthorChip({{ author.id }}, {{ author.name|tojson }})'
        tabindex="0"
        onkeydown='if(event.key==="Enter") addAuthorChip({{ author.id }}, {{ author.name|tojson }})'>
        {{ author.name }}
    </li>
    {% endfor %}
</ul>
{% elif query %}
<p class="tag-search-empty">No authors found matching "{{ query }}"</p>
{% endif %}
